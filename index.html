<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ræven">
<meta name="theme-color" content="#FBF6EE">
<title>Ræven – Matematik FP9</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBF6EE;
    --bg-card: #FFFFFF;
    --ink: #1F1B16;
    --ink-soft: #6B6358;
    --line: #E8DFD0;
    --accent: #E85D2F;        /* burnt orange — fox */
    --accent-soft: #FCE5D8;
    --green: #2F7D5B;
    --green-soft: #DCEFE4;
    --red: #C44536;
    --gold: #D4A93C;
    --blue: #3B5BA5;
    --blue-soft: #DDE5F4;
    --shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px -12px rgba(31,27,22,0.12);
    --radius: 18px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* subtle paper grain on the background */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(31,27,22,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

  /* ===== TOP BAR ===== */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px;
  }
  .stat {
    display: flex; align-items: center; gap: 6px;
    font-weight: 600; font-size: 15px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 12px 6px 8px;
  }
  .stat svg { width: 18px; height: 18px; }
  .stat.streak { color: #E07F2F; }
  .stat.hearts { color: var(--red); }
  .stat.gems { color: var(--blue); }

  /* ===== SCREENS ===== */
  .screen { display: none; padding: 0 18px 100px; animation: fadeIn .25s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none; } }

  /* ===== HOME ===== */
  .greeting {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 500;
    letter-spacing: -0.02em;
    margin: 18px 0 4px;
    line-height: 1.15;
  }
  .greeting em { font-style: italic; color: var(--accent); font-weight: 600; }
  .sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 22px; }

  .daily-card {
    background: var(--ink);
    color: var(--bg);
    border-radius: var(--radius);
    padding: 22px;
    position: relative;
    overflow: hidden;
    margin-bottom: 26px;
  }
  .daily-card::before {
    content: "";
    position: absolute; right: -40px; top: -40px;
    width: 180px; height: 180px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.85;
  }
  .daily-card::after {
    content: "";
    position: absolute; right: 30px; top: 30px;
    width: 60px; height: 60px;
    background: var(--gold);
    border-radius: 50%;
  }
  .daily-card .label {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 8px; position: relative; z-index: 1;
  }
  .daily-card h2 {
    font-family: 'Fraunces', serif;
    font-size: 26px; font-weight: 500;
    margin: 0 0 14px; line-height: 1.15;
    position: relative; z-index: 1;
    max-width: 260px;
  }
  .daily-card .progress {
    height: 6px; background: rgba(255,255,255,0.15);
    border-radius: 999px; overflow: hidden;
    margin-bottom: 14px;
    position: relative; z-index: 1;
  }
  .daily-card .progress > div {
    height: 100%; background: var(--bg);
    transition: width .4s ease;
  }
  .daily-card .progress-text {
    font-size: 12px; color: rgba(255,255,255,0.7);
    position: relative; z-index: 1;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 500;
    letter-spacing: -0.01em;
    margin: 8px 0 14px;
  }

  /* path of skills */
  .path { display: flex; flex-direction: column; gap: 14px; }
  .topic-block { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
  .topic-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .topic-head h3 {
    font-family: 'Fraunces', serif;
    font-size: 18px; font-weight: 500;
    margin: 0;
  }
  .topic-head .pct { font-size: 13px; color: var(--ink-soft); font-weight: 500; }
  .topic-bar { height: 4px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 14px; }
  .topic-bar > div { height: 100%; transition: width .4s ease; }

  .skills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .skill {
    aspect-ratio: 1;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
    border: none; cursor: pointer;
    background: var(--line);
    color: var(--ink-soft);
    position: relative;
    transition: transform .15s ease;
    padding: 4px; text-align: center; line-height: 1.1;
    font-family: inherit;
  }
  .skill:active { transform: scale(0.94); }
  .skill.unlocked { background: var(--accent-soft); color: var(--accent); }
  .skill.completed { background: var(--green-soft); color: var(--green); }
  .skill.completed::after {
    content: "✓"; position: absolute; top: -4px; right: -4px;
    width: 18px; height: 18px; background: var(--green); color: white;
    border-radius: 50%; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg-card);
  }
  .skill.locked::after {
    content: "🔒"; position: absolute; top: 4px; right: 4px; font-size: 10px;
  }
  .skill .stars { position: absolute; bottom: 4px; left: 0; right: 0; font-size: 8px; letter-spacing: 1px; color: var(--gold); }

  /* ===== LESSON SCREEN ===== */
  .lesson { display: none; padding: 0 18px 30px; }
  .lesson.active { display: block; }
  .lesson-top { display: flex; align-items: center; gap: 14px; padding: 14px 0 22px; }
  .close-btn {
    background: none; border: none; font-size: 24px;
    color: var(--ink-soft); cursor: pointer; padding: 0;
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  }
  .lesson-progress {
    flex: 1; height: 12px; background: var(--line);
    border-radius: 999px; overflow: hidden;
  }
  .lesson-progress > div {
    height: 100%; background: var(--green);
    border-radius: 999px;
    transition: width .35s cubic-bezier(.2,.8,.2,1);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.08);
  }
  .lesson-hearts { color: var(--red); font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 4px; }
  .lesson-hearts svg { width: 18px; height: 18px; }

  .question-area { margin-top: 12px; }
  .q-label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px; }
  .q-text {
    font-family: 'Fraunces', serif;
    font-size: 26px; font-weight: 500; line-height: 1.25;
    letter-spacing: -0.01em;
    margin: 0 0 24px;
  }
  .q-math {
    font-family: 'Fraunces', serif;
    font-size: 30px; font-weight: 500;
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
    margin-bottom: 24px;
    text-align: center;
  }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    background: var(--bg-card);
    border: 2px solid var(--line);
    border-bottom-width: 4px;
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    text-align: left;
    font-size: 16px; font-weight: 500;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
    transition: transform .1s ease, border-color .15s ease, background .15s ease;
  }
  .choice:active { transform: translateY(2px); border-bottom-width: 2px; }
  .choice.selected { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .choice.correct { border-color: var(--green); background: var(--green-soft); color: var(--green); }
  .choice.wrong { border-color: var(--red); background: #FCE3E0; color: var(--red); }
  .choice:disabled { cursor: default; }

  .numeric-input {
    width: 100%;
    padding: 18px 20px;
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    text-align: center;
    border: 2px solid var(--line);
    border-bottom-width: 4px;
    border-radius: var(--radius-sm);
    background: var(--bg-card);
    color: var(--ink);
    outline: none;
    transition: border-color .15s ease;
  }
  .numeric-input:focus { border-color: var(--accent); }
  .numeric-input.correct { border-color: var(--green); background: var(--green-soft); color: var(--green); }
  .numeric-input.wrong { border-color: var(--red); background: #FCE3E0; color: var(--red); }

  /* feedback bar at bottom */
  .feedback {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--bg-card);
    padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line);
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.2,.8,.2,1);
    z-index: 10;
  }
  .feedback.show { transform: translateY(0); }
  .feedback.correct { background: var(--green-soft); }
  .feedback.wrong { background: #FCE3E0; }
  .feedback-inner { max-width: 480px; margin: 0 auto; }
  .feedback h4 {
    font-family: 'Fraunces', serif;
    font-size: 22px; font-weight: 600; margin: 0 0 4px;
  }
  .feedback.correct h4 { color: var(--green); }
  .feedback.wrong h4 { color: var(--red); }
  .feedback p { margin: 0 0 12px; font-size: 14px; color: var(--ink-soft); line-height: 1.5; }
  .feedback p strong { color: var(--ink); }

  .btn {
    display: block; width: 100%;
    padding: 16px;
    font-family: inherit;
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.02em;
    border-radius: var(--radius-sm);
    border: none;
    border-bottom: 4px solid rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform .1s ease, opacity .15s ease;
    background: var(--accent); color: white;
  }
  .btn:active { transform: translateY(2px); border-bottom-width: 2px; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn.green { background: var(--green); }
  .btn.red { background: var(--red); }
  .btn.dark { background: var(--ink); }
  .btn.ghost {
    background: transparent; color: var(--ink-soft);
    border: 1px solid var(--line);
    border-bottom: 4px solid var(--line);
  }

  /* ===== RESULTS SCREEN ===== */
  .results { display: none; padding: 30px 18px; text-align: center; }
  .results.active { display: block; }
  .results .fox { width: 120px; height: 120px; margin: 20px auto; }
  .results h2 {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 500;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
  }
  .results .sub { font-size: 15px; margin-bottom: 30px; }
  .results-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin: 0 0 30px;
  }
  .results-stat {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 16px 8px;
  }
  .results-stat .label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .results-stat .value {
    font-family: 'Fraunces', serif;
    font-size: 26px; font-weight: 600;
  }
  .results-stat.xp .value { color: var(--accent); }
  .results-stat.acc .value { color: var(--green); }
  .results-stat.time .value { color: var(--blue); }

  /* fox illustration */
  .fox-mascot { width: 80px; height: 80px; margin: 0 auto 16px; display: block; }

  /* ===== UTILS ===== */
  .pulse { animation: pulse .4s ease; }
  @keyframes pulse { 0% { transform: scale(1);} 50% { transform: scale(1.1);} 100% { transform: scale(1);} }
  .shake { animation: shake .3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }

  /* hide arrows on number input */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR (visible on home) -->
  <div class="topbar" id="topbar">
    <div class="stat streak">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 2c.5 4 3.5 5.5 3.5 9 0 3-2 5-5 5s-5-2-5-5c0-1.5.5-2.5 1.5-3.5C7.5 9 7 10.5 8 12c0-2 1-3.5 2-4.5C11.5 6 13 4.5 13.5 2z"/></svg>
      <span id="streakNum">0</span>
    </div>
    <div class="stat gems">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 3h12l4 6-10 12L2 9z"/></svg>
      <span id="xpNum">0</span>
    </div>
    <div class="stat hearts">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6 5c2 0 3.5 1 6 3.5C14.5 6 16 5 18 5c3.5 0 5 4 3.5 7-2.5 4.5-9.5 9-9.5 9z"/></svg>
      <span id="heartsNum">5</span>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <div class="screen active" id="homeScreen">
    <h1 class="greeting">Hej, <em id="userName">Sofie</em> 🦊</h1>
    <p class="sub" id="homeSub">Klar til dagens matematik?</p>

    <div class="daily-card" id="dailyCard">
      <div class="label">Dagens lektion</div>
      <h2 id="dailyTitle">Brøker og procent</h2>
      <div class="progress"><div id="dailyProgress" style="width: 0%"></div></div>
      <div class="progress-text"><span id="dailyDone">0</span> af 5 lektioner i dag</div>
    </div>

    <h3 class="section-title">Stofområder</h3>
    <div class="path" id="topicsList"></div>
  </div>

  <!-- LESSON SCREEN -->
  <div class="lesson" id="lessonScreen">
    <div class="lesson-top">
      <button class="close-btn" id="closeLesson" aria-label="Luk">×</button>
      <div class="lesson-progress"><div id="lessonProgressBar" style="width: 0%"></div></div>
      <div class="lesson-hearts">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6 5c2 0 3.5 1 6 3.5C14.5 6 16 5 18 5c3.5 0 5 4 3.5 7-2.5 4.5-9.5 9-9.5 9z"/></svg>
        <span id="lessonHearts">5</span>
      </div>
    </div>
    <div class="question-area" id="questionArea"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div class="results" id="resultsScreen">
    <svg class="fox" viewBox="0 0 100 100">
      <!-- celebrating fox -->
      <ellipse cx="50" cy="80" rx="28" ry="6" fill="rgba(0,0,0,0.06)"/>
      <path d="M50 70 Q30 70 28 50 Q26 30 35 22 L42 38 L58 38 L65 22 Q74 30 72 50 Q70 70 50 70 Z" fill="#E85D2F"/>
      <path d="M35 22 L42 38 L40 30 Z" fill="#C44A24"/>
      <path d="M65 22 L58 38 L60 30 Z" fill="#C44A24"/>
      <path d="M40 50 Q50 60 60 50 Q55 65 50 65 Q45 65 40 50 Z" fill="#FBF6EE"/>
      <circle cx="42" cy="46" r="2.5" fill="#1F1B16"/>
      <circle cx="58" cy="46" r="2.5" fill="#1F1B16"/>
      <path d="M48 54 Q50 56 52 54" stroke="#1F1B16" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="50" cy="52" rx="2" ry="1.5" fill="#1F1B16"/>
    </svg>
    <h2 id="resultsTitle">Godt gået!</h2>
    <p class="sub" id="resultsSub">Du har gennemført lektionen</p>
    <div class="results-stats">
      <div class="results-stat xp"><div class="label">XP</div><div class="value" id="resultsXP">0</div></div>
      <div class="results-stat acc"><div class="label">Korrekt</div><div class="value" id="resultsAcc">0%</div></div>
      <div class="results-stat time"><div class="label">Tid</div><div class="value" id="resultsTime">0:00</div></div>
    </div>
    <button class="btn dark" id="resultsContinue">Fortsæt</button>
  </div>

  <!-- FEEDBACK BAR -->
  <div class="feedback" id="feedback">
    <div class="feedback-inner">
      <h4 id="feedbackTitle"></h4>
      <p id="feedbackText"></p>
      <button class="btn green" id="feedbackBtn">Fortsæt</button>
    </div>
  </div>

</div>

<script>
/* =========================================================
   CONTENT — Danish FP9 math, organised by stofområde
   Each skill = a small set of questions she'll see repeatedly
   Question types: 'mc' (multiple choice) | 'num' (numeric input)
   ========================================================= */

const TOPICS = [
  {
    id: 'tal',
    name: 'Tal og algebra',
    color: '#3B5BA5',
    skills: [
      {
        id: 'broker',
        name: 'Brøker',
        questions: [
          { type:'mc', q:'Hvad er ½ + ¼?', choices:['¾','⅔','⅖','1'], answer:0, explain:'½ = 2/4. Så 2/4 + 1/4 = 3/4.' },
          { type:'mc', q:'Hvilken brøk er størst?', choices:['⅔','¾','⅗','½'], answer:1, explain:'¾ = 0,75, ⅔ ≈ 0,67, ⅗ = 0,6, ½ = 0,5. ¾ er størst.' },
          { type:'num', q:'Skriv ⅖ som decimaltal.', answer:0.4, explain:'2 ÷ 5 = 0,4.' },
          { type:'mc', q:'⅗ af 40 er...', choices:['20','24','15','30'], answer:1, explain:'⅕ af 40 = 8. ⅗ af 40 = 3 × 8 = 24.' },
          { type:'num', q:'Hvad er ¾ + ⅛? Skriv som decimaltal.', answer:0.875, explain:'¾ = 6/8. 6/8 + 1/8 = 7/8 = 0,875.' },
        ]
      },
      {
        id: 'procent',
        name: 'Procent',
        questions: [
          { type:'num', q:'Hvad er 25% af 80?', answer:20, explain:'25% = ¼. 80 ÷ 4 = 20.' },
          { type:'mc', q:'En vare koster 200 kr og sættes 15% ned. Ny pris?', choices:['185 kr','170 kr','160 kr','150 kr'], answer:1, explain:'15% af 200 = 30. 200 − 30 = 170 kr.' },
          { type:'num', q:'12 er hvor mange procent af 60?', answer:20, explain:'12 ÷ 60 = 0,2 = 20%.' },
          { type:'mc', q:'En pris stiger fra 80 kr til 100 kr. Hvor mange procent stiger den?', choices:['20%','25%','15%','30%'], answer:1, explain:'Stigning = 20 kr. 20 ÷ 80 = 0,25 = 25%.' },
          { type:'num', q:'150 kr inkl. 25% moms — hvad er prisen uden moms?', answer:120, explain:'150 ÷ 1,25 = 120 kr.' },
        ]
      },
      {
        id: 'ligninger',
        name: 'Ligninger',
        questions: [
          { type:'num', q:'Løs: 2x + 6 = 14. x =', answer:4, explain:'2x = 14 − 6 = 8. x = 8/2 = 4.' },
          { type:'num', q:'Løs: 3x − 7 = 11. x =', answer:6, explain:'3x = 11 + 7 = 18. x = 6.' },
          { type:'mc', q:'Hvilken værdi af x løser 5x = 3x + 10?', choices:['2','5','10','3'], answer:1, explain:'5x − 3x = 10, så 2x = 10, x = 5.' },
          { type:'num', q:'Løs: x/4 + 2 = 5. x =', answer:12, explain:'x/4 = 3, så x = 12.' },
          { type:'num', q:'Løs: 2(x − 3) = 10. x =', answer:8, explain:'x − 3 = 5, så x = 8.' },
        ]
      },
      {
        id: 'potenser',
        name: 'Potenser og rødder',
        questions: [
          { type:'num', q:'Hvad er 2⁵?', answer:32, explain:'2 × 2 × 2 × 2 × 2 = 32.' },
          { type:'num', q:'√144 =', answer:12, explain:'12 × 12 = 144.' },
          { type:'mc', q:'Hvad er 3³?', choices:['9','27','12','81'], answer:1, explain:'3 × 3 × 3 = 27.' },
          { type:'num', q:'√81 =', answer:9, explain:'9 × 9 = 81.' },
          { type:'mc', q:'Hvad er 10⁴?', choices:['1.000','10.000','100.000','40'], answer:1, explain:'10⁴ = 10 × 10 × 10 × 10 = 10.000.' },
        ]
      },
    ]
  },
  {
    id: 'geo',
    name: 'Geometri og måling',
    color: '#2F7D5B',
    skills: [
      {
        id: 'areal',
        name: 'Areal',
        questions: [
          { type:'num', q:'Et rektangel har sider 6 og 4. Areal =', answer:24, explain:'Areal = længde × bredde = 6 × 4 = 24.' },

/* =========================================================
   STATE — saved to localStorage
   ========================================================= */
const DEFAULT_STATE = {
  name: 'Sofie',
  xp: 0,
  hearts: 5,
  streak: 0,
  lastPlayed: null,
  dailyDone: 0,
  dailyDate: null,
  skills: {}, // skillId -> { stars: 0-3, completed: bool, attempts: int }
};

let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem('mathfox_state');
    if (s) return { ...DEFAULT_STATE, ...JSON.parse(s) };
  } catch (e) {}
  return { ...DEFAULT_STATE };
}
function saveState() {
  try { localStorage.setItem('mathfox_state', JSON.stringify(state)); } catch (e) {}
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function checkDaily() {
  const today = todayStr();
  if (state.dailyDate !== today) {
    // new day
    if (state.lastPlayed) {
      const last = new Date(state.lastPlayed);
      const diff = Math.floor((Date.now() - last.getTime()) / (1000*60*60*24));
      if (diff > 1) state.streak = 0; // streak broken
    }
    state.dailyDone = 0;
    state.dailyDate = today;
    saveState();
  }
}

/* =========================================================
   HOME SCREEN RENDERING
   ========================================================= */
function renderHome() {
  checkDaily();
  document.getElementById('userName').textContent = state.name;
  document.getElementById('streakNum').textContent = state.streak;
  document.getElementById('xpNum').textContent = state.xp;
  document.getElementById('heartsNum').textContent = state.hearts;
  document.getElementById('dailyDone').textContent = state.dailyDone;

  const pct = Math.min(100, (state.dailyDone / 5) * 100);
  document.getElementById('dailyProgress').style.width = pct + '%';

  // pick "today's" suggested skill — first incomplete skill
  let suggested = null;
  outer: for (const t of TOPICS) {
    for (const s of t.skills) {
      const st = state.skills[s.id];
      if (!st || !st.completed) { suggested = s; break outer; }
    }
  }
  if (suggested) {
    document.getElementById('dailyTitle').textContent = suggested.name;
    document.getElementById('dailyCard').onclick = () => startLesson(suggested);
  } else {
    document.getElementById('dailyTitle').textContent = 'Repetition';
    document.getElementById('dailyCard').onclick = () => {
      // pick a random completed one for review
      const all = TOPICS.flatMap(t => t.skills);
      const pick = all[Math.floor(Math.random() * all.length)];
      startLesson(pick);
    };
  }

  // render topics
  const list = document.getElementById('topicsList');
  list.innerHTML = '';
  for (const topic of TOPICS) {
    const completedCount = topic.skills.filter(s => state.skills[s.id]?.completed).length;
    const totalCount = topic.skills.length;
    const topicPct = Math.round((completedCount / totalCount) * 100);

    const block = document.createElement('div');
    block.className = 'topic-block';
    block.innerHTML = `
      <div class="topic-head">
        <h3>${topic.name}</h3>
        <span class="pct">${completedCount}/${totalCount}</span>
      </div>
      <div class="topic-bar"><div style="width:${topicPct}%;background:${topic.color}"></div></div>
      <div class="skills"></div>
    `;
    const skillsEl = block.querySelector('.skills');
    topic.skills.forEach((skill, idx) => {
      const st = state.skills[skill.id] || {};
      const prevDone = idx === 0 || state.skills[topic.skills[idx-1].id]?.completed;
      const status = st.completed ? 'completed' : (prevDone ? 'unlocked' : 'locked');
      const btn = document.createElement('button');
      btn.className = `skill ${status}`;
      btn.innerHTML = `<span>${skill.name}</span>${st.completed ? `<div class="stars">${'★'.repeat(st.stars||1)}</div>` : ''}`;
      btn.disabled = status === 'locked';
      if (status !== 'locked') btn.onclick = () => startLesson(skill);
      skillsEl.appendChild(btn);
    });
    list.appendChild(block);
  }
}

/* =========================================================
   LESSON FLOW
   ========================================================= */
let lesson = null;
let lessonStart = 0;

function startLesson(skill) {
  if (state.hearts <= 0) {
    alert('Du har ingen hjerter tilbage! Vent lidt eller bliv ved at træne — hjerter kommer tilbage senere.');
    return;
  }
  // shuffle questions
  const qs = [...skill.questions].sort(() => Math.random() - 0.5);
  lesson = {
    skill,
    questions: qs,
    idx: 0,
    correct: 0,
    wrong: 0,
    heartsLost: 0,
  };
  lessonStart = Date.now();
  showScreen('lesson');
  renderQuestion();
}

function renderQuestion() {
  const q = lesson.questions[lesson.idx];
  const total = lesson.questions.length;
  const pct = (lesson.idx / total) * 100;
  document.getElementById('lessonProgressBar').style.width = pct + '%';
  document.getElementById('lessonHearts').textContent = state.hearts;

  const area = document.getElementById('questionArea');
  if (q.type === 'mc') {
    area.innerHTML = `
      <div class="q-label">Spørgsmål ${lesson.idx + 1} af ${total}</div>
      <h2 class="q-text">${q.q}</h2>
      <div class="choices">
        ${q.choices.map((c,i) => `<button class="choice" data-idx="${i}">${c}</button>`).join('')}
      </div>
    `;
    area.querySelectorAll('.choice').forEach(btn => {
      btn.onclick = () => {
        area.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        // auto-check after short delay
        setTimeout(() => checkMC(parseInt(btn.dataset.idx)), 200);
      };
    });
  } else if (q.type === 'num') {
    area.innerHTML = `
      <div class="q-label">Spørgsmål ${lesson.idx + 1} af ${total}</div>
      <h2 class="q-text">${q.q}</h2>
      <input class="numeric-input" id="numInput" type="number" inputmode="decimal" step="any" autofocus placeholder="?">
      <div style="height:14px"></div>
      <button class="btn dark" id="numCheck">Tjek svar</button>
    `;
    const input = document.getElementById('numInput');
    setTimeout(() => input.focus(), 100);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') checkNum();
    });
    document.getElementById('numCheck').onclick = checkNum;
  }
}

function checkMC(idx) {
  const q = lesson.questions[lesson.idx];
  const correct = idx === q.answer;
  document.querySelectorAll('.choice').forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.remove('selected');
    if (i === q.answer) btn.classList.add('correct');
    if (i === idx && !correct) btn.classList.add('wrong');
  });
  showFeedback(correct, q.explain, q.choices[q.answer]);
}

function checkNum() {
  const q = lesson.questions[lesson.idx];
  const input = document.getElementById('numInput');
  const val = parseFloat(input.value.replace(',', '.'));
  if (isNaN(val)) { input.classList.add('shake'); setTimeout(()=>input.classList.remove('shake'),300); return; }
  const correct = Math.abs(val - q.answer) < 0.01;
  input.classList.add(correct ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('numCheck').disabled = true;
  showFeedback(correct, q.explain, q.answer);
}

function showFeedback(correct, explain, correctAnswer) {
  const fb = document.getElementById('feedback');
  fb.classList.remove('correct', 'wrong');
  fb.classList.add(correct ? 'correct' : 'wrong');
  document.getElementById('feedbackTitle').textContent = correct ? 'Rigtigt! 🎉' : 'Ikke helt';
  document.getElementById('feedbackText').innerHTML = correct
    ? explain
    : `Det rigtige svar er <strong>${correctAnswer}</strong>. ${explain}`;
  fb.classList.add('show');
  if (correct) {
    lesson.correct++;
    state.xp += 10;
    document.getElementById('xpNum').textContent = state.xp;
    document.getElementById('xpNum').classList.add('pulse');
    setTimeout(()=>document.getElementById('xpNum').classList.remove('pulse'), 400);
  } else {
    lesson.wrong++;
    state.hearts = Math.max(0, state.hearts - 1);
    lesson.heartsLost++;
    document.getElementById('lessonHearts').textContent = state.hearts;
    document.getElementById('heartsNum').textContent = state.hearts;
  }
  saveState();
}

document.getElementById('feedbackBtn').onclick = () => {
  document.getElementById('feedback').classList.remove('show');
  setTimeout(() => {
    lesson.idx++;
    if (lesson.idx >= lesson.questions.length) {
      finishLesson();
    } else {
      renderQuestion();
    }
  }, 200);
};

function finishLesson() {
  const total = lesson.questions.length;
  const accuracy = Math.round((lesson.correct / total) * 100);
  const elapsedMs = Date.now() - lessonStart;
  const mins = Math.floor(elapsedMs / 60000);
  const secs = Math.floor((elapsedMs % 60000) / 1000);
  const xpEarned = lesson.correct * 10 + (accuracy === 100 ? 20 : 0);

  // award stars based on accuracy
  let stars = 1;
  if (accuracy >= 80) stars = 2;
  if (accuracy === 100) stars = 3;

  // mark skill as completed if not already
  const skillState = state.skills[lesson.skill.id] || { stars: 0, completed: false, attempts: 0 };
  skillState.attempts++;
  skillState.stars = Math.max(skillState.stars, stars);
  if (accuracy >= 80) skillState.completed = true;
  state.skills[lesson.skill.id] = skillState;

  // daily progress
  state.dailyDone++;
  state.lastPlayed = Date.now();
  if (state.dailyDone === 1 && (!state.streak || state.dailyDate !== todayStr())) {
    // increment streak on first lesson of the day
  }
  // streak: if completed at least 1 today, streak should reflect
  state.streak = Math.max(state.streak, state.dailyDone > 0 ? state.streak || 1 : 0);
  // increment streak only when crossing from 0 -> 1 on a new day
  if (state.dailyDone === 1) {
    state.streak = (state.streak || 0) + 1;
  }
  saveState();

  document.getElementById('resultsXP').textContent = '+' + xpEarned;
  document.getElementById('resultsAcc').textContent = accuracy + '%';
  document.getElementById('resultsTime').textContent = mins + ':' + (secs<10?'0':'') + secs;
  if (accuracy === 100) {
    document.getElementById('resultsTitle').textContent = 'Perfekt! ✨';
    document.getElementById('resultsSub').textContent = 'Alle svar rigtige — flot arbejde!';
  } else if (accuracy >= 80) {
    document.getElementById('resultsTitle').textContent = 'Godt gået!';
    document.getElementById('resultsSub').textContent = 'Du har gennemført lektionen';
  } else {
    document.getElementById('resultsTitle').textContent = 'God indsats';
    document.getElementById('resultsSub').textContent = 'Prøv igen for at låse næste op';
  }

  showScreen('results');
}

document.getElementById('resultsContinue').onclick = () => {
  showScreen('home');
  renderHome();
};

document.getElementById('closeLesson').onclick = () => {
  if (confirm('Vil du afslutte lektionen? Din fremgang bliver ikke gemt.')) {
    showScreen('home');
    renderHome();
  }
};

/* =========================================================
   SCREEN ROUTER
   ========================================================= */
function showScreen(name) {
  document.getElementById('topbar').style.display = (name === 'home') ? 'flex' : 'none';
  document.getElementById('homeScreen').classList.toggle('active', name === 'home');
  document.getElementById('lessonScreen').classList.toggle('active', name === 'lesson');
  document.getElementById('resultsScreen').classList.toggle('active', name === 'results');
  if (name !== 'lesson') document.getElementById('feedback').classList.remove('show');
  window.scrollTo(0, 0);
}

/* =========================================================
   INIT
   ========================================================= */
renderHome();
</script>
